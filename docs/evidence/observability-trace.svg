    <rect x="328" y="384" width="26" height="12" rx="2" fill="#64748b"/>
    <rect x="388" y="384" width="26" height="12" rx="2" fill="#64748b"/>
    <rect x="450" y="384" width="26" height="12" rx="2" fill="#64748b"/>
    <text x="240" y="373" fill="#082f49">list/read files + partial findings</text>

    <text x="54" y="432" fill="#334155" font-weight="700">research</text>
    <rect x="508" y="416" width="300" height="24" rx="4" fill="#f59e0b"/>
    <rect x="536" y="444" width="28" height="12" rx="2" fill="#a16207"/>
    <rect x="590" y="444" width="28" height="12" rx="2" fill="#a16207"/>
    <rect x="646" y="444" width="28" height="12" rx="2" fill="#a16207"/>
    <text x="522" y="433" fill="#451a03">rag_search + web fallback</text>

    <text x="54" y="492" fill="#334155" font-weight="700">test</text>
    <rect x="742" y="476" width="320" height="24" rx="4" fill="#8b5cf6"/>
    <rect x="830" y="504" width="70" height="12" rx="2" fill="#6d28d9"/>
    <rect x="932" y="504" width="82" height="12" rx="2" fill="#6d28d9"/>
