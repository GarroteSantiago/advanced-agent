  <rect x="54" y="650" width="1152" height="28" rx="6" fill="#e5e7eb"/>
  <text x="70" y="669" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="13">Source artifact: docs/evidence/repo-analysis.otel.jsonl. Captured through the OpenTelemetry/Phoenix boundary; the repo stores the headless trace file.</text>
